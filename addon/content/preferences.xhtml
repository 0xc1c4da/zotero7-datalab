<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window });"
>
  <label><html:h2 data-l10n-id="pref-title"></html:h2></label>
  <vbox>
    <vbox>
      <hbox align="center">
        <html:label
          for="zotero-prefpane-__addonRef__-apikey"
          data-l10n-id="pref-endpoint"
        ></html:label>
        <html:input
          type="password"
          id="zotero-prefpane-__addonRef__-apikey"
          preference="extensions.zotero.__addonRef__.apikey"
          style="width: 300px;"
        ></html:input>
      </hbox>
      <hbox>
        <html:a
          href="https://www.datalab.to/app/keys"
          data-l10n-id="pref-api-key-link"
          style="margin-left: 150px;"
        ></html:a>
      </hbox>
    </vbox>
    <hbox align="center">
      <html:input
        type="checkbox"
        id="zotero-prefpane-__addonRef__-download-images"
        preference="extensions.zotero.__addonRef__.downloadImages"
      ></html:input>
      <html:label
        for="zotero-prefpane-__addonRef__-download-images"
        data-l10n-id="pref-download-images"
      ></html:label>
    </hbox>
  </vbox>
</groupbox>
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
